# Documented in .cursorrules:
#   mainnet: 0x8b4a2c4bb53857c718a04c020b98f8c2e1f99a68b0f57389a8bf5434cd22e05c
#   testnet: 0x69faed94da99abb7316cb3ec2eeaa1b961a47349fad8c584f67a930b0d14fec7
dex_contract = "_"
