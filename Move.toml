[package]
name = "yab_protocol"
version = "1.0.0"
upgrade_policy = "compatible"
authors = []

# Named addresses for this package and dependencies (see dependency `dex` / Hyperion interface).
# All named addresses must be resolved here for `aptos move compile` (no "_"), OR use [dev-addresses] + `aptos move compile --dev`.
#
# Pyth `pyth`, `wormhole`, `deployer` — same on Aptos mainnet and testnet (official docs):
# https://docs.pyth.network/price-feeds/contract-addresses/aptos
#
# `dex_contract` — published Hyperion DEX package (`.cursorrules`): testnet vs mainnet.
[addresses]
yab = "0x8a233984c022b893a3b84f031abbac21ac5e9dd58159bce14b8ed0a155baaffb"
pyth = "0x7e783b349d3e89cf5931af376ebeadbfab855b3fa239b7ada8f5a92fbea6b387"
wormhole = "0x5bc11445584a763c1fa7ed39081f1b920954da14e04b32440cba863d03e19625"
dex_contract = "0x69faed94da99abb7316cb3ec2eeaa1b961a47349fad8c584f67a930b0d14fec7"
deployer = "0xb31e712b26fd295357355f6845e77c888298636609e93bc9b05f0f604049f434"

[dev-addresses]

[dependencies.AptosFramework]
git = "https://github.com/aptos-labs/aptos-core.git"
subdir = "aptos-move/framework/aptos-framework"
rev = "main"

[dependencies.AptosStdlib]
git = "https://github.com/aptos-labs/aptos-core.git"
subdir = "aptos-move/framework/aptos-stdlib"
rev = "main"

[dependencies.Pyth]
git = "https://github.com/pyth-network/pyth-crosschain.git"
subdir = "target_chains/aptos/contracts"
rev = "main"

# Package name in this repo is `dex` (modules: dex_contract::pool_v3, router_v3, position_v3, ...).
[dependencies.dex]
git = "https://github.com/Hyperfluid/hyperfluid-interface"
rev = "main"

[dev-dependencies]
