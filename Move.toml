[package]
name = "yab_protocol"
version = "1.0.0"
upgrade_policy = "compatible"
authors = []

# Named addresses for this package and dependencies (see dependency `dex` / Hyperion interface).
# All named addresses must be resolved here for `aptos move compile` (no "_"), OR use [dev-addresses] + `aptos move compile --dev`.
#
# `deployer` — Wormhole deployer (Hyperion / local dex stubs). Add `pyth` / `wormhole` named addresses
# when re-enabling the real Pyth dependency in `oracle.move`.
# `dex_contract` — published Hyperion DEX package (`.cursorrules`): testnet vs mainnet.
[addresses]
yab = "0xd42e699a4b22880d77da7dd02bb2fa768ecaa8cb1c4aa1423f968f480c97a60b"
dex_contract = "0x8b4a2c4bb53857c718a04c020b98f8c2e1f99a68b0f57389a8bf5434cd22e05c"
deployer = "0xb31e712b26fd295357355f6845e77c888298636609e93bc9b05f0f604049f434"

[dev-addresses]

# Match Aptos git rev embedded in the published Pyth package on Aptos testnet/mainnet (see `aptos move download --print-metadata`).
[dependencies.AptosFramework]
git = "https://github.com/aptos-labs/aptos-core.git"
subdir = "aptos-move/framework/aptos-framework"
rev = "2c74a456298fcd520241a562119b6fe30abdaae2"

[dependencies.AptosStdlib]
git = "https://github.com/aptos-labs/aptos-core.git"
subdir = "aptos-move/framework/aptos-stdlib"
rev = "2c74a456298fcd520241a562119b6fe30abdaae2"

# Hyperion CLMM interface — pin matches published Hyperion on Aptos testnet (see `dex_contract` in [addresses]).
[dependencies.dex]
git = "https://github.com/Hyperfluid/hyperfluid-interface.git"
rev = "595fec8db8c9bd9aa7050f7342f316d48f722108"

[dev-dependencies]
